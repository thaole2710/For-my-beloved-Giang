<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Web Của Tôi</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; }
        p { color: #666; font-size: 18px; }
        audio { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Xin chào!</h1>
        <p>Đây là lời nhắn và file ghi âm dành cho bạn.</p>
        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>

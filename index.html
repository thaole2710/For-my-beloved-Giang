<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Giang của em ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Toàn bộ nền màu xanh dương nhạt (Theo yêu cầu ban đầu của bạn) */
        body {
            background-color: #e3f2fd; 
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Khung giới thiệu màu be */
        .intro-box {
            background-color: #f5f5dc; 
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            border: 1px solid #e0e0d1;
            margin-bottom: 30px;
        }

        h1 {
            color: #1e88e5; /* Màu xanh đậm hơn để nổi bật */
            margin-bottom: 20px;
        }

        p {
            color: #444;
            font-size: 1.1rem;
        }

        /* Nút bấm phát nhạc màu xanh dương */
        .play-btn {
            background-color: #1e88e5;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.3);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: translateY(-2px);
            background-color: #1565c0;
        }

        .play-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="intro-box">
        <h1>Gửi Giang ❤️</h1>
        <p>Đây là những điều em muốn nói cho Giang nghe, mong Giang những lúc lạc lối nhất, nó có thể làm ánh sáng cho anh.</p>
    </div>

    <button class="play-btn" id="btn" onclick="handleMusic()">Nhấn để nghe lời nhắn</button>

    <audio id="myAudio">
        <source src="voice.mp3.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ nghe nhạc.
    </audio>

    <script>
        function handleMusic() {
            var audio = document.getElementById("myAudio");
            var btn = document.getElementById("btn");

            if (audio.paused) {
                audio.play();
                btn.innerText = "Đang gửi anh... ♪";
                btn.style.backgroundColor = "#43a047"; // Đổi sang màu xanh lá khi đang phát cho dễ nhận biết
            } else {
                audio.pause();
                btn.innerText = "Tiếp tục nghe";
                btn.style.backgroundColor = "#1e88e5";
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Giang của em ❤️</title>
    <style>
        /* Toàn bộ nền màu đỏ */
        body {
            background-color: #9B0F06;
            font-family: 'Nunito', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Khung giới thiệu màu hồng */
        .intro-box {
            background-color: #FF7070;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            border: 1px solid #ffffff;
            margin-bottom: 30px;
        }

        h1 {
            color: #FEFFD3;
            margin-bottom: 20px;
        }

        p {
            color: #FEFFD3;
            font-size: 1.1rem;
        }

        /* Nút bấm phát nhạc màu hồng */
        .play-btn {
            background-color: #FF7070;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background-color: #FF7070;
            transform: translateY(-2px);
        }

        .play-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="intro-box">
        <h1>Gửi Giang ❤️</h1>
        <p>Đây là những điều em muốn nói cho Giang nghe, mong Giang những lúc lạc lối nhất, nó có thể làm ánh sáng cho anh.</p>
    </div>

    <button class="play-btn" id="btn" onclick="handleMusic()">Nhấn để nghe lời nhắn</button>

    <audio id="myAudio">
        <source src="voice.mp3.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ nghe nhạc.
    </audio>

    <script>
        function handleMusic() {
            var audio = document.getElementById("myAudio");
            var btn = document.getElementById("btn");

            if (audio.paused) {
                audio.play();
                btn.innerText = "gửi anh... ♪";
                btn.style.backgroundColor = "#FEFFD3"; // Đổi sang hồng khi đang phát
            } else {
                audio.pause();
                btn.innerText = "Tiếp tục nghe";
                btn.style.backgroundColor = "#FEFFD3";
            }
        }
    </script>

</body>
</html>
